server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Enable gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 256;
    gzip_vary on;

    # Versioned assets: the build cachebusts URLs with /v/<commitHash>/ prefix
    # but files are built to the root of the build folder. Strip the prefix.
    # Using rewrite ... last so nginx re-evaluates location blocks with the
    # rewritten URI, ensuring proper static file serving and MIME types.
    location ~ ^/v/[a-f0-9]+/(.*)$ {
        rewrite ^/v/[a-f0-9]+/(.*)$ /$1 last;
    }

    # Non-versioned static assets (legacy / direct references)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2|mp3|webm)$ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # SPA fallback - serve index.html for all routes
    location / {
        try_files $uri $uri/ /index.html;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
    }

    # Health check
    location = /health {
        access_log off;
        return 200 "ok";
    }

    # Favicon - return empty if not found
    location = /favicon.ico {
        access_log off;
        log_not_found off;
        return 204;
    }
}
